server:
  port: ${SERVER_PORT}

spring:
  config:
    import: optional:file:.env[.properties]

#AWS
aws:
  region: ${AWS_REGION}
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}
  sqs-queue-name: ${AWS_SQS_QUEUE_NAME}

logging:
  level:
    com.ssafy.c204_be_judge.judge: debug

judge:
  api-server:
    base-url: ${LOCAL_API_SERVER_URL}
    result-path: ${JUDGE_RESULT_API_PATH}
